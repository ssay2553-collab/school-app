name: Build Android APKs
on:
  workflow_dispatch:
    inputs:
      school_profile:
        description: 'Select the school profile to build'
        required: true
        default: 'all-prod'
        type: choice
        options:
          - all-prod
          - afahjoy-prod
          - beano-prod
          - bishops-prod
          - bms-prod
          - brain-prod
          - cascom-prod
          - creation-prod
          - eagles-prod
          - ibs-prod
          - kent-prod
          - model-prod
          - morgis-prod
          - perfect-prod
          - clis-prod
          - stone-prod
          - jewel-prod
          - lilies-prod

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.set-profiles.outputs.profiles }}
    steps:
      - id: set-profiles
        run: |
          if [ "${{ github.event.inputs.school_profile }}" == "all-prod" ]; then
            echo 'profiles=["afahjoy-prod", "beano-prod", "bishops-prod", "bms-prod", "brain-prod", "cascom-prod", "creation-prod", "eagles-prod", "ibs-prod", "kent-prod", "model-prod", "morgis-prod", "perfect-prod", "clis-prod", "stone-prod", "jewel-prod", "lilies-prod"]' >> $GITHUB_OUTPUT
          else
            echo 'profiles=["${{ github.event.inputs.school_profile }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(needs.setup.outputs.profiles) }}
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Prebuild Expo
        run: |
          # Correctly extract the school ID
          RAW_PROFILE="${{ matrix.profile }}"
          export SCHOOL_ID=${RAW_PROFILE%-prod}
          echo "Prebuilding for School ID: $SCHOOL_ID"
          rm -rf android
          npx expo prebuild --platform android --no-install
        env:
          NODE_ENV: production

      - name: 🛠 Build APK
        run: |
          RAW_PROFILE="${{ matrix.profile }}"
          export SCHOOL_ID=${RAW_PROFILE%-prod}
          export EXPO_PUBLIC_SCHOOL_ID=$SCHOOL_ID
          echo "Building APK for School: $SCHOOL_ID"
          
          cd android
          chmod +x gradlew
          # Increase memory for the Gradle Daemon and set NODE_ENV
          ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
        env:
          NODE_ENV: production
          CI: true

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-apk
          path: android/app/build/outputs/apk/release/*.apk
