name: Build Android APKs
on:
  workflow_dispatch:
    inputs:
      school_profile:
        description: 'Select the school profile to build'
        required: true
        default: 'all-prod'
        type: choice
        options:
          - all-prod
          - afahjoy-prod
          - beano-prod
          - bishops-prod
          - bms-prod
          - brain-prod
          - cascom-prod
          - creation-prod
          - eagles-prod
          - ibs-prod
          - kent-prod
          - model-prod
          - morgis-prod
          - perfect-prod
          - clis-prod
          - stone-prod
          - jewel-prod

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.set-profiles.outputs.profiles }}
    steps:
      - id: set-profiles
        run: |
          if [ "${{ github.event.inputs.school_profile }}" == "all-prod" ]; then
            echo 'profiles=["afahjoy-prod", "beano-prod", "bishops-prod", "bms-prod", "brain-prod", "cascom-prod", "creation-prod", "eagles-prod", "ibs-prod", "kent-prod", "model-prod", "morgis-prod", "perfect-prod", "clis-prod", "stone-prod", "jewel-prod"]' >> $GITHUB_OUTPUT
          else
            echo 'profiles=["${{ github.event.inputs.school_profile }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(needs.setup.outputs.profiles) }}
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Prebuild Expo
        run: |
          # Extract school ID (e.g., afahjoy from afahjoy-prod)
          export SCHOOL_ID=$(echo "${{ matrix.profile }}" | cut -d'-' -f1)
          echo "Prebuilding for School ID: $SCHOOL_ID"
          
          # Clean any existing native folders to ensure a fresh start
          rm -rf android
          
          # Generate the native android folder dynamically
          npx expo prebuild --platform android --no-install
        env:
          SCHOOL_ID: ${{ steps.set-profiles.outputs.school_id }} # This line is handled by the export above

      - name: 🛠 Build APK
        run: |
          export SCHOOL_ID=$(echo "${{ matrix.profile }}" | cut -d'-' -f1)
          cd android
          chmod +x gradlew
          # assembleRelease creates the production-ready APK
          ./gradlew assembleRelease
        env:
          SCHOOL_ID: ${{ steps.set-profiles.outputs.school_id }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-apk
          # We use a wildcard to find the APK regardless of internal naming
          path: android/app/build/outputs/apk/release/*.apk
